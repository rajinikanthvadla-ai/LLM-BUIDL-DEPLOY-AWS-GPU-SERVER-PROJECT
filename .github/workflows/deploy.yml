name: Deploy EC2

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "app/**"
      - "Dockerfile"
      - "docker-compose.yml"
      - "requirements.txt"

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script_stop: true
          script: |
            set -e
            REPO="${{ github.server_url }}/${{ github.repository }}.git"
            GH_TOKEN="${{ secrets.GH_DEPLOY_TOKEN }}"
            [ -n "$GH_TOKEN" ] && REPO="https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git"
            mkdir -p ~/app && cd ~/app
            if [ -d domain-llm/.git ]; then
              cd domain-llm && git fetch origin && git reset --hard origin/main
            else
              git clone --depth 1 -b main "$REPO" domain-llm && cd domain-llm
            fi
            S3_URI="${{ secrets.S3_ADAPTER_URI }}"
            if [ -n "$S3_URI" ]; then
              mkdir -p /adapters/domain
              AWS_ACCESS_KEY_ID="${{ secrets.AWS_ACCESS_KEY_ID }}" \
              AWS_SECRET_ACCESS_KEY="${{ secrets.AWS_SECRET_ACCESS_KEY }}" \
              AWS_DEFAULT_REGION="${{ secrets.AWS_REGION }}" \
              aws s3 sync "$S3_URI" /adapters/domain --quiet
              export ADAPTER_DIR=/adapters LORA_PATH=/adapters/domain
            else
              export ADAPTER_DIR=/adapters LORA_PATH=
            fi
            ADAPTER_DIR=$ADAPTER_DIR LORA_PATH=$LORA_PATH \
              docker compose build --no-cache
            ADAPTER_DIR=$ADAPTER_DIR LORA_PATH=$LORA_PATH \
              docker compose up -d --remove-orphans
